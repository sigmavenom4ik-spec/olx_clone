<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OLX Clone - Объявления</title>
    <!-- Подключаем Bootstrap для красоты -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover; /* Чтобы картинки не сплющивались */
        }
        .price-text {
            font-size: 1.25rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light">

<!-- Навигационная панель (Шапка) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">OLX Clone</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Свежие объявления</h2>

    <div class="row">
        <!-- НАЧАЛО МАГИИ DJANGO -->
        {% for ad in ads %}
            <!-- Карточка одного объявления (Занимает 3 колонки из 12) -->
            <div class="col-md-3 mb-4">
                <div class="card h-100 shadow-sm">
                    
                    <!-- Проверка: если есть картинка, показываем её, иначе - заглушку -->
                    {% if ad.image %}
                        <img src="{{ ad.image.url }}" class="card-img-top" alt="{{ ad.title }}">
                    {% else %}
                        <img src="https://via.placeholder.com/300x200?text=Нет+фото" class="card-img-top" alt="Нет фото">
                    {% endif %}
                    
                    <div class="card-body d-flex flex-column">
                        <!-- Название товара -->
                        <h5 class="card-title text-truncate">
                            <a href="{% url 'ad_detail' ad.pk %}" class="text-decoration-none text-dark">
                                {{ ad.title }}
                            </a>
                        </h5>
                        <!-- Город -->
                        <p class="card-text text-muted mb-2"><small>{{ ad.city }}</small></p>
                        <!-- Цена -->
                        <p class="card-text price-text mt-auto">{{ ad.price }} грн.</p>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <small class="text-muted">{{ ad.created_at|date:"d.m.Y H:i" }}</small>
                    </div>
                </div>
            </div>
        
        <!-- Если в базе нет ни одного объявления -->
        {% empty %}
            <div class="col-12">
                <div class="alert alert-info text-center" role="alert">
                    Объявлений пока нет. Будьте первым!
                </div>
            </div>
        {% endfor %}
        <!-- КОНЕЦ МАГИИ DJANGO -->
    </div>
</div>

</body>
</html>
