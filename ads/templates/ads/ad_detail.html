<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ ad.title }} - OLX Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Назад на главную</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                {% if ad.image %}
                    <img src="{{ ad.image.url }}" class="card-img-top" alt="{{ ad.title }}">
                {% else %}
                    <img src="https://via.placeholder.com/800x400?text=Нет+фото" class="card-img-top" alt="Нет фото">
                {% endif %}
                <div class="card-body">
                    <h3 class="card-title">{{ ad.title }}</h3>
                    <p class="text-muted">{{ ad.city }} Добавлено: {{ ad.created_at:"d.m.Y" }}</p>
                    <hr>
                    <h5>Описание: </h5>

                    <p class="card-text">{{ ad.description|linebreaksbr }}</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="text-success mb-4">{{ ad.price }} грн.</h2>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg" type="button">
                            {{ ad.phone_number }}
                        </button>
                        <button class="btn btn-outline-secondary btn-lg" type="button">
                            Написать автору
                        </button>
                    </div>
                    <hr>
                    <p class="mb-0"><strong>Продавец:</strong> {{ ad.author.username }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
